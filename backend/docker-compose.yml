services:
  # Main Omi backend
  omi-backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8080"
    environment:
      - REDIS_DB_HOST=redis
      - REDIS_DB_PORT=6379
      - REDIS_DB_PASSWORD=yourpassword
      - VECTOR_DB_HOST=vectordb
      - VECTOR_DB_PORT=6333
      - TYPESENSE_HOST=typesense
      - TYPESENSE_HOST_PORT=8108
      - TYPESENSE_API_KEY=xyz
      - LOCAL_LLM_HOST=llm-service
      - LOCAL_LLM_PORT=11434
      # Other environment variables as needed
    volumes:
      - ./backend:/app
    depends_on:
      - redis
      - vectordb
      - typesense
      - llm-service

  # Redis for caching and real-time data
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    command: redis-server --requirepass yourpassword
    volumes:
      - redis-data:/data

  # Vector database (Qdrant as an example)
  vectordb:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage

  # Typesense for search
  typesense:
    image: typesense/typesense:0.24.1
    ports:
      - "8108:8108"
    environment:
      - TYPESENSE_API_KEY=xyz
      - TYPESENSE_DATA_DIR=/data
    volumes:
      - typesense-data:/data

  # Local LLM service (example using Ollama)
  llm-service:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

volumes:
  redis-data:
  qdrant-data:
  typesense-data:
  ollama-data: